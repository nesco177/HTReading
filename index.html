<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meter Data</title>
<style>
body { font-family: Arial; background: #f3f6fb; margin:0; padding:20px; }
.container { max-width:500px; margin:auto; }
.card { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); margin-bottom:20px; }
h2 { margin-top:0; }
.card div { margin-bottom:12px; }
label { display:block; margin-bottom:4px; font-weight:bold; }
input { width: calc(100% - 20px); padding:10px; border:1px solid #ddd; border-radius:6px; font-size:14px; display:block; }
button { width:100%; padding:12px; background:#1976d2; color:white; border:none; border-radius:8px; font-size:15px; cursor:pointer; margin-top:6px; }
button:hover { background:#125aa0; }
.updated { background:#d1ffd8 !important; transition: background 0.5s; }
.status { font-size:12px; margin-top:5px; }
.pending { color:#e65100; }
.synced { color:#2e7d32; }
</style>
</head>
<body>

<div class="container">

  <div class="card">
      <h2>Search Account</h2>
      <div><label for="acc">Serial</label><input id="acc"></div>
      <button onclick="search()">Search</button>
      <button style="background:#28a745;" onclick="forceRefresh()">Force Refresh DB</button>
  </div>

  <div id="card1" class="card">
      <h2>Energy Data</h2>
      <div><label>Peak</label><input id="peak"></div>
      <div><label>Off-Peak</label><input id="offpeak"></div>
      <div><label>KVAR Peak</label><input id="kvarp"></div>
      <div><label>KVAR Off-Peak</label><input id="kvaro"></div>
      <div><label>CMD</label><input id="cmd"></div>
      <button onclick="updateEnergy()">Update</button>
      <div id="status1" class="status"></div>
  </div>

  <div id="card2" class="card">
      <h2>Electrical Data</h2>
      <div><label>V1</label><input id="v1"></div>
      <div><label>V2</label><input id="v2"></div>
      <div><label>V3</label><input id="v3"></div>
      <div><label>I1</label><input id="i1"></div>
      <div><label>I2</label><input id="i2"></div>
      <div><label>I3</label><input id="i3"></div>
      <div><label>Angle V1</label><input id="av1"></div>
      <div><label>Angle V2</label><input id="av2"></div>
      <div><label>Angle V3</label><input id="av3"></div>
      <div><label>Angle I1</label><input id="ai1"></div>
      <div><label>Angle I2</label><input id="ai2"></div>
      <div><label>Angle I3</label><input id="ai3"></div>
      <button onclick="updateElectrical()">Update</button>
      <div id="status2" class="status"></div>
  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz0WX0_4YyFjrOOcoqqbQzRLS0ubLo0vwEmb_0Yb6rk_s0m-pIOtTMG3WI0fai2J5m8/exec";

let database = {};
let row = "";
let pendingUpdates = JSON.parse(localStorage.getItem("pendingUpdates") || "[]");

function loadDatabase(force=false){
    if(!force && Object.keys(database).length > 0){
        return Promise.resolve();
    }

    return fetch(API+"?all=1")
    .then(r=>r.json())
    .then(arr=>{
        database = {};
        arr.forEach(d=>{
            database[String(d.Serial).trim()] = d;
        });
    });
}

function fillData(d){
    row = d.row || "";

    peak.value=d.Peak||"";
    offpeak.value=d["Off-peak"]||"";
    kvarp.value=d.Kvar||"";
    kvaro.value=d.OpkKvar||"";
    cmd.value=d.CMD||"";

    v1.value=d.V1||"";
    v2.value=d.V2||"";
    v3.value=d.V3||"";

    i1.value=d.I1||"";
    i2.value=d.I2||"";
    i3.value=d.I3||"";

    av1.value=d["<V1"]||"";
    av2.value=d["<V2"]||"";
    av3.value=d["<V3"]||"";

    ai1.value=d["<I1"]||"";
    ai2.value=d["<I2"]||"";
    ai3.value=d["<I3"]||"";
}

function search(){
    const id = acc.value.trim();

    if(!id){
        alert("Please enter serial number");
        return;
    }

    if(database[id]){
        fillData(database[id]);
    } else {
        alert("❌ Number not found");
    }
}

function forceRefresh(){
    loadDatabase(true)
    .then(()=>{
        alert("✅ Database refreshed successfully");
    })
    .catch(()=>{
        alert("❌ Failed to refresh database");
    });
}

function collectData(){
    return {
        row,
        peak:peak.value, offpeak:offpeak.value,
        kvarp:kvarp.value, kvaro:kvaro.value, cmd:cmd.value,
        v1:v1.value, v2:v2.value, v3:v3.value,
        i1:i1.value, i2:i2.value, i3:i3.value,
        av1:av1.value, av2:av2.value, av3:av3.value,
        ai1:ai1.value, ai2:ai2.value, ai3:ai3.value,
        updatedAt: Date.now(),
        status:"pending"
    };
}

function saveQueue(){
    localStorage.setItem("pendingUpdates", JSON.stringify(pendingUpdates));
}

async function sendData(item){
    try{
        const res = await fetch(API,{
            method:"POST",
            body: JSON.stringify(item)
        });

        let json;
        try{
            json = await res.json();
        }catch(e){
            json = {status:"updated"}; 
        }

        if(
            json.status === "updated" ||
            json.status === "ignored" ||
            json.result === "success" ||
            res.ok
        ){
            return true;
        }

        return false;

    }catch(err){
        return false;
    }
}

async function syncPending(){
    if(!navigator.onLine || pendingUpdates.length===0) return;

    let newQueue = [];

    for(let item of pendingUpdates){
        let ok = await sendData(item);

        if(!ok){
            newQueue.push(item); 
        }
    }

    pendingUpdates = newQueue;
    saveQueue();
    updateStatusUI();
}

function sendOrQueue(data, cardId){
    pendingUpdates.push(data);
    saveQueue();
    updateStatusUI();

    if(navigator.onLine){
        setTimeout(syncPending, 500);
    }

    updateCard(cardId);
}

function updateEnergy(){ sendOrQueue(collectData(),"card1"); }
function updateElectrical(){ sendOrQueue(collectData(),"card2"); }

// UI
function updateCard(id){
    const card=document.getElementById(id);
    card.classList.add("updated");
    setTimeout(()=>card.classList.remove("updated"),1000);
}

function updateStatusUI(){
    const text = pendingUpdates.length>0
        ? "🟡 Pending ("+pendingUpdates.length+")"
        : "🟢 Synced";

    status1.innerText = text;
    status2.innerText = text;
}

window.addEventListener("online", syncPending);
setInterval(syncPending, 500);

loadDatabase().then(()=>{
    syncPending(); 
    updateStatusUI();
});

document.querySelectorAll("input").forEach(i=>{
    i.setAttribute("inputmode", "decimal");
});
</script>

</body>
</html>
