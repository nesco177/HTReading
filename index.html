<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meter Data</title>
<style>
body { font-family: Arial; background: #f3f6fb; margin:0; padding:20px; }
.container { max-width:500px; margin:auto; }
.card { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); margin-bottom:20px; }
h2 { margin-top:0; }
.card div { margin-bottom:12px; }
label { display:block; margin-bottom:4px; font-weight:bold; }
input { width: calc(100% - 20px); padding:10px; border:1px solid #ddd; border-radius:6px; font-size:14px; display:block; }
button { width:100%; padding:12px; background:#1976d2; color:white; border:none; border-radius:8px; font-size:15px; cursor:pointer; margin-top:6px; }
button:hover { background:#125aa0; }
.updated { background:#d1ffd8 !important; transition: background 0.5s; }
</style>
</head>
<body>

<div class="container">

  <div class="card">
      <h2>Search Account</h2>
      <div><label for="acc">Serial</label><input id="acc" placeholder="Enter Serial 400-600"></div>
      <button onclick="search()">Search</button>
      <button style="background:#28a745;" onclick="forceRefresh()">Force Refresh DB</button>
  </div>

  <div id="card1" class="card">
      <h2>Energy Data</h2>
      <div><label for="peak">Peak</label><input id="peak"></div>
      <div><label for="offpeak">Off-Peak</label><input id="offpeak"></div>
      <div><label for="kvarp">KVAR Peak</label><input id="kvarp"></div>
      <div><label for="kvaro">KVAR Off-Peak</label><input id="kvaro"></div>
      <div><label for="cmd">CMD</label><input id="cmd"></div>
      <button onclick="updateEnergy()">Update</button>
  </div>

  <div id="card2" class="card">
      <h2>Electrical Data</h2>
      <div><label for="v1">V1</label><input id="v1"></div>
      <div><label for="v2">V2</label><input id="v2"></div>
      <div><label for="v3">V3</label><input id="v3"></div>
      <div><label for="i1">I1</label><input id="i1"></div>
      <div><label for="i2">I2</label><input id="i2"></div>
      <div><label for="i3">I3</label><input id="i3"></div>
      <div><label for="av1">Angle V1</label><input id="av1"></div>
      <div><label for="av2">Angle V2</label><input id="av2"></div>
      <div><label for="av3">Angle V3</label><input id="av3"></div>
      <div><label for="ai1">Angle I1</label><input id="ai1"></div>
      <div><label for="ai2">Angle I2</label><input id="ai2"></div>
      <div><label for="ai3">Angle I3</label><input id="ai3"></div>
      <button onclick="updateElectrical()">Update</button>
  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz0WX0_4YyFjrOOcoqqbQzRLS0ubLo0vwEmb_0Yb6rk_s0m-pIOtTMG3WI0fai2J5m8/exec"; // replace with your deployed Apps Script URL
let database = {};
let row = "";


function loadDatabase(force=false){
    const now = Date.now();
    const cached = localStorage.getItem("meterDatabase");

    if(!force && cached){
        try{
            const dataObj = JSON.parse(cached);
            if(now - dataObj.timestamp < 24*60*60*1000){
                database = dataObj.data;
                console.log("Database loaded from cache");
                return Promise.resolve();
            }
        }catch(e){ console.warn("Failed to parse cached DB"); }
    }

    return fetch(API+"?all=1")
        .then(r=>r.json())
        .then(arr=>{
            database = {};
            arr.forEach(d=>{
                if(d.Serial!==undefined) database[String(d.Serial).trim()] = d;
            });
            localStorage.setItem("meterDatabase", JSON.stringify({data: database, timestamp: now}));
            console.log("Database loaded from API");
        })
        .catch(err=>{
            console.error("Failed to load database:", err);
            alert("Error loading database. Check API or internet.");
        });
}


function fillData(d){
    if(!d) return;
    row = d.row || "";
    const mapping = {
        peak: "Peak",
        offpeak: "Off-peak",
        kvarp: "Kvar",
        kvaro: "OpkKvar",
        cmd: "CMD",
        v1: "V1",
        v2: "V2",
        v3: "V3",
        i1: "I1",
        i2: "I2",
        i3: "I3",
        av1: "<V1",
        av2: "<V2",
        av3: "<V3",
        ai1: "<I1",
        ai2: "<I2",
        ai3: "<I3"
    };
    Object.keys(mapping).forEach(id=>{
        if(d[mapping[id]]!==undefined) document.getElementById(id).value = d[mapping[id]];
    });
}


function search(){
    const id = document.getElementById("acc").value.trim();
    if(database[id]) fillData(database[id]);
    else alert("Serial not found!");
}


function forceRefresh(){
    loadDatabase(true).then(()=>alert("Database refreshed successfully!"));
}


function updateEnergy(){
    fetch(API,{method:"POST",body:JSON.stringify({
        row,row,
        peak:peak.value,offpeak:offpeak.value,kvarp:kvarp.value,kvaro:kvaro.value,cmd:cmd.value,
        v1:v1.value,v2:v2.value,v3:v3.value,
        i1:i1.value,i2:i2.value,i3:i3.value,
        av1:av1.value,av2:av2.value,av3:av3.value,
        ai1:ai1.value,ai2:ai2.value,ai3:ai3.value
    })});
    const card=document.getElementById("card1"); card.classList.add("updated");
    setTimeout(()=>card.classList.remove("updated"),1000);
}


function updateElectrical(){
    fetch(API,{method:"POST",body:JSON.stringify({
        row,row,
        peak:peak.value,offpeak:offpeak.value,kvarp:kvarp.value,kvaro:kvaro.value,cmd:cmd.value,
        v1:v1.value,v2:v2.value,v3:v3.value,
        i1:i1.value,i2:i2.value,i3:i3.value,
        av1:av1.value,av2:av2.value,av3:av3.value,
        ai1:ai1.value,ai2:ai2.value,ai3:ai3.value
    })});
    const card=document.getElementById("card2"); card.classList.add("updated");
    setTimeout(()=>card.classList.remove("updated"),1000);
}


loadDatabase();
</script>

</body>
</html>
